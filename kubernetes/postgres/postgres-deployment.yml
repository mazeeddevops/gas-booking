apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: gas-booking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_DB
          value: gasdb
        - name: POSTGRES_USER
          value: gas
        - name: POSTGRES_PASSWORD
          value: gas

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

      volumes:
      - name: postgres-storage
        emptyDir: {}
